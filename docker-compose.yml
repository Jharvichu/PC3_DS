services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voz_ciudadana
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'

  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voz_ciudadana
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - '4173:4173'
    environment:
      VITE_API_BASE: http://localhost:8000/api
    depends_on:
      - backend
